# PostgreSQL cho dev — khớp mặc định trong backend/env.example
# Chạy: docker compose up -d
# Sau đó: cd backend && copy env.example .env (chỉnh mật khẩu nếu đổi POSTGRES_PASSWORD)
#         python manage.py migrate && python manage.py runserver

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: nt4
    ports:
      - "5432:5432"
    volumes:
      - fashionstore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nt4"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fashionstore_pgdata:
